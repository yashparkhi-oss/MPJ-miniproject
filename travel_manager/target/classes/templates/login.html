<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Travel Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #05050a 0%, #0d1229 50%, #1a0b2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #f1f5f9;
        }

        .glass-card {
            background: rgba(20, 20, 35, 0.6);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(139, 92, 246, 0.3);
            padding: 3rem 2rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
        }

        .form-floating input {
            border-radius: 10px;
        }

        .form-control {
            background-color: rgba(10, 10, 15, 0.6) !important;
            border: 1px solid rgba(139, 92, 246, 0.3) !important;
            color: #fff !important;
        }

        .form-control:focus {
            background-color: rgba(15, 15, 25, 0.9) !important;
            border-color: #8b5cf6 !important;
            box-shadow: 0 0 0 0.25rem rgba(139, 92, 246, 0.25) !important;
        }

        .form-control::placeholder {
            color: #888 !important;
        }

        .form-floating label {
            color: #94a3b8 !important;
        }

        .btn-brand {
            background: linear-gradient(to right, #4338ca, #8b5cf6);
            border: none;
            border-radius: 10px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-brand:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
            color: white;
        }

        .text-muted {
            color: #94a3b8 !important;
        }
    </style>
</head>

<body>
    <div class="glass-card text-center">
        <div class="mb-4">
            <span class="display-3">🌍</span>
            <h2 class="fw-bold mt-2">Welcome Back</h2>
            <p class="text-muted">Manage your travel expenses smartly</p>
        </div>

        <div th:if="${param.error}"
            class="alert py-2 rounded-3 shadow-sm text-light border border-danger bg-danger bg-opacity-25">
            ⚠ Invalid username or password.
        </div>

        <div th:if="${param.logout}"
            class="alert py-2 rounded-3 shadow-sm text-light border border-success bg-success bg-opacity-25">
            👋 You have been logged out successfully.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-floating mb-3 text-start">
                <input type="text" class="form-control" name="username" id="floatingInput" placeholder="Username"
                    required autofocus>
                <label for="floatingInput">Username</label>
            </div>
            <div class="form-floating mb-4 text-start">
                <input type="password" class="form-control" name="password" id="floatingPassword" placeholder="Password"
                    required>
                <label for="floatingPassword">Password</label>
            </div>

            <button class="btn btn-brand btn-lg w-100 text-white mb-3" type="submit">Log In 🚀</button>
        </form>

        <p class="mt-4 mb-0 text-muted">
            New traveler? <a href="/register" class="text-decoration-none fw-bold" style="color: #a78bfa;">Create an
                account</a>
        </p>
    </div>
</body>

</html>
